[project]
name = "dbdreader"
version = "0.6.1"
description = "A python module to access binary data files generated by Teledyne WebbResearch gliders"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Lucas Merckelbach", email = "lucas.merckelbach@hereon.de"}
]
license = {text = "GPL-3.0-or-later"}
classifiers = [
    "Programming Language :: Python :: 3",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: POSIX",
]
dependencies = [
    "lz4>=4.4.5",
    "numpy>=2.2.6",
]


[project.scripts]
dbdrename = "dbdreader.scripts:dbdrename"
cac_gen = "dbdreader.scripts:cac_gen"

[project.urls]
Homepage = "https://dbdreader.readthedocs.io/en/latest/"

[dependency-groups]
dev = [
    "black>=26.3.1",
    "ipython>=8.39.0",
    "myst-parser>=4.0.1",
    "pytest>=9.0.2",
    "sphinx-rtd-theme>=3.1.0",
]


[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["dbdreader"]
include-package-data = false

[tool.setuptools.package-data]
dbdreader = ["data/*"]


[tool.pytest.ini_options]
filterwarnings = "always::UserWarning"
#addopts = "--markdown-docs-syntax=superfences"
log_cli = true
log_cli_level = "DEBUG"

[tool.black]
line-length = 88
target-version = ['py311', 'py312', 'py313', 'py314']
include = '\.pyi?$'
exclude = '''

(
  /(
    | \.ipynb_checkpoints
    | \.pytest_cache
    | __pycache__
  )/
)

'''

[tool.mypy]
python_version = "3.13"
strict = true  # Enable all checks
disallow_untyped_calls = true
